<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640">
  <defs>
    <style>
      .pcb, .background {
        stroke-width: 0;
      }
      .construction-line {
        stroke: #888;
        stroke-width: 0;
      }
      .pcb {
        fill: #063;
      }
      .background {
        fill: #f6f6f6;
      }
      .bb-label, .gpio-label, .pico-label, .dvi-sock-label {
        font-family: Helvetica;
        font-size: 1.5px;
        fill: #ffffff;
        dominant-baseline: middle;
        stroke-width: 1;
      }
      .bb-holes, .wire {
        fill: none;
      }
      .bb-label {
        fill: #aaa;
        /* text-anchor: end; does not like this */
      }
      .pico-label {
        font-size: 2.5px;
        text-anchor: middle;
      }
      .dvi-sock-label {
        font-size: 2px;
        text-anchor: middle;
      }
      .gpio-label-right {
        text-anchor: end;
      }
      .breadboard {
        fill: #ebebeb;
      }
      .bb-holes {
        stroke: #999;
        stroke-width: 1;
        stroke-dasharray: 1 1.54;
      }
      .bb-line {
        stroke: #bbb;
        stroke-width: .1;
      }
      .micro-usb, .dvi-sock-usb-socket {
        fill: #bbbbbb;
      }
      .rp2 {
        fill: #333333;
      }
      .wire {
        stroke-width: .5;
      }
      .s-orange {
        stroke: #ff7f00;
      }
      .s-orange {
        stroke: #ff7f00;
      }
      .s-white {
        stroke: #ffffff;
      }
      .s-yellow {
        stroke: #f8dc21;
      }
      .s-black {
        stroke: #000;
      }
      .s-red {
        stroke: #c00000;
      }
      .s-light-red {
        stroke: #f00;
      }
      .s-brown {
        stroke: #977b67;
      }
      .s-green {
        stroke: #0c0;
      }
      .s-light-green {
        stroke: #0f0;
      }
      .s-blue {
        stroke: #0000c0;
      }
      .s-light-blue {
        stroke: #00f;
      }
      .s-dashed {
        stroke-dasharray: 1 .5;
      }
    </style>
