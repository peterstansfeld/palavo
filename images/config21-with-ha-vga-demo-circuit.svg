        <text>Pico 2</text>
      </g>
    </g>
    <g id="rpi-pico-or-pico2">
      <use href="#rpi-pico-footprint"/>
      <g class="pico-label" transform="translate(10.5 37)">
        <text>Pico</text>
        <text y="3" style="font-size: 2px">or</text>
        <text y="6">Pico 2</text>
      </g>
    </g>
    <g id="dvi-sock">
      <rect class="dvi-sock-pcb" width="23" height="28" rx="1"/>
      <path class="construction-line" d="m11.5,0 v28"/>
      <rect class="dvi-sock-usb-socket" x="4" y="20" width="15" height="11" rx=".5"/>
      <g class="dvi-sock-label" transform="translate(11.5 1.37)">
        <text y="5.08" >DVI SOCK</text>
