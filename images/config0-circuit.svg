<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640">
  <defs>
    <style>
      .pcb, .background, .vga-plate {
        stroke-width: 0;
      }
      .construction-line {
        stroke: #888;
        stroke-width: 0;
      }
      .pcb {
        fill: #063;
      }
      .background {
        fill: #f6f6f6;
      }
      .bb-label, .gpio-label, .pico-label {
        font-family: Helvetica;
        font-size: 1.5px;
        fill: #ffffff;
        dominant-baseline: middle;
        stroke-width: 1;
      }
      .bb-holes, .wire, .res-wire, .res-band {
        fill: none;
      }
      .bb-label {
        fill: #aaa;
        /* text-anchor: end; does not like this */
      }
      .pico-label {
        font-size: 2.5px;
        text-anchor: middle;
      }
      .gpio-label-right {
        text-anchor: end;
      }
      .breadboard {
        fill: #ebebeb;
      }
      .bb-holes {
        stroke: #999;
        stroke-width: 1;
        stroke-dasharray: 1 1.54;
      }
      .bb-line {
        stroke: #bbb;
        stroke-width: .1;
      }
      .res-wire {
        stroke: #555;
        stroke-width: .5;
      }
      .micro-usb {
        fill: #bbbbbb;
      }
      .rp2 {
        fill: #333333;
      }
      .wire {
        stroke-width: .5;
      }
      .s-orange {
        stroke: #ff7f00;
      }
      .s-orange {
        stroke: #ff7f00;
      }
      .s-yellow {
        stroke: #f8dc21;
      }
      .s-black {
        stroke: #000;
      }
      .s-red {
        stroke: #c00000;
      }
      .s-light-red {
        stroke: #f00;
      }
      .s-green {
        stroke: #0c0;
      }
      .s-light-green {
        stroke: #0f0;
      }
      .s-blue {
        stroke: #0000c0;
      }
      .s-light-blue {
        stroke: #00f;
      }
      .res-gold {
        stroke: #d8a148;
      }
      .res-yellow {
        stroke: #ff0;
      }
      .res-violet {
        stroke: #9061a7;
      }
      .res-black {
        stroke: #000;
      }
      .res-red {
        stroke: #f00;
      }
      .res-brown {
        stroke: #977b67;
      }
      .black-label {
        fill: #222222;
      }
      .res-band {
        stroke-width: .375;
      }
      .vga-plate {
        fill: #cccccc;
        stroke: #999;
      }
      .vga-shroud {
        fill: #ebebeb;
        stroke: #888;
        stroke-width: .4;
      }
      .vga-pins {
        fill: #999;
      }
      .res-body {
        fill: #e8c595;
        stroke: none;
